<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Account Verified | School Bus Track Pro</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    .confirm-card { background: white; padding: 48px 40px; border-radius: 24px; box-shadow: 0 20px 60px rgba(15,23,42,0.12); text-align: center; max-width: 420px; width: 100%; border: 1px solid var(--border); }
    .status-icon { font-size: 64px; margin-bottom: 20px; display: block; }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    h1 { font-size: 24px; font-weight: 900; margin-bottom: 12px; color: var(--navy); }
    p { color: var(--text-secondary); margin-bottom: 30px; line-height: 1.6; font-size: 14px; }
    .brand { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 32px; }
  </style>
</head>
<body>
<div class="confirm-card">
  <div class="brand">School Bus Track Pro</div>

  <span class="status-icon" id="status-icon">
    <i class="bi bi-arrow-clockwise spin" id="inner-icon" style="color:var(--navy);"></i>
  </span>

  <h1 id="confirm-title">Verifying your email...</h1>
  <p id="confirm-desc">Please wait while we confirm your account. This only takes a moment.</p>

  <a href="index.html" class="btn btn-yellow btn-full" id="proceed-btn" style="display:none;font-weight:800;padding:14px;">
    Go to Login <i class="bi bi-arrow-right-short" style="font-size:20px;"></i>
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
  import { supabase } from './js/config.js';

  const iconEl   = document.getElementById('status-icon');
  const innerEl  = document.getElementById('inner-icon');
  const titleEl  = document.getElementById('confirm-title');
  const descEl   = document.getElementById('confirm-desc');
  const btnEl    = document.getElementById('proceed-btn');

  async function handleConfirmation() {
    try {
      const params    = new URLSearchParams(window.location.search);
      const tokenHash = params.get('token_hash');
      const type      = params.get('type') || 'signup';

      // Hash fragment fallback (legacy)
      const hash = window.location.hash;
      const hashParams = new URLSearchParams(hash.substring(1));
      const hashError  = hashParams.get('error_description');
      if (hashError) throw new Error(hashError);

      if (tokenHash) {
        // New Supabase email template format
        const { error } = await supabase.auth.verifyOtp({ token_hash: tokenHash, type });
        if (error) throw error;
      } else {
        // Legacy: Supabase auto-processes hash on getSession()
        const { data: { session }, error } = await supabase.auth.getSession();
        if (error) throw error;
        if (!session) throw new Error('Verification session not found. The link may have expired or already been used.');
      }

      // ✅ Success
      iconEl.style.color = 'var(--green)';
      innerEl.className = 'bi bi-check-circle-fill';
      titleEl.textContent = 'Email Verified!';
      descEl.textContent = 'Your account has been successfully verified. You can now log in to access your dashboard.';
      btnEl.style.display = 'block';
      await supabase.auth.signOut();

    } catch (err) {
      iconEl.style.color = '#dc2626';
      innerEl.className = 'bi bi-exclamation-octagon-fill';
      titleEl.textContent = 'Verification Failed';
      descEl.textContent = err.message || 'The confirmation link is invalid or expired. Please try registering again.';
      btnEl.textContent = 'Back to Login';
      btnEl.style.display = 'block';
    }
  }

  handleConfirmation();
</script>
</body>
</html>
