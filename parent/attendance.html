<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Attendance Log | School Bus Track Pro</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/parent.css">
  <style>
    .attendance-scroll { max-height: 600px; overflow-y: auto; padding: 10px; scrollbar-width: thin; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar desktop-only">
    <div class="sidebar-logo">
      <img src="../assets/images/logo.png" alt="Logo">
      <div class="logo-text" id="sidebar-school-name">School Bus Track Pro <small>Parent Portal</small></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">Safety Tracking</div>
      <a href="map.html" class="nav-link"><i class="bi bi-radar"></i><span>Live Tracking</span></a>
      <a href="attendance.html" class="nav-link active"><i class="bi bi-calendar-check"></i><span>Attendance Log</span></a>
      <div class="nav-group-label">Account</div>
      <a href="alerts.html" class="nav-link"><i class="bi bi-bell"></i><span>Alert Settings</span></a>
      <a href="profile.html" class="nav-link"><i class="bi bi-person-gear"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-user">
        <div class="admin-avatar" id="sidebar-initial">P</div>
        <div class="admin-user-info" style="color:white;font-size:13px;">
          <div style="font-weight:800;" id="sidebar-parent-name">Guardian</div>
          <div style="opacity:0.6;font-size:11px;">Verified Account</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <div>
        <h1 class="topbar-title">Attendance History</h1>
        <p style="font-size:13px;color:var(--text-secondary);">Historical boarding and drop-off records</p>
      </div>
      <button id="export-btn" class="btn btn-sm btn-navy">
        <i class="bi bi-download"></i> Export Data
      </button>
    </header>

    <div class="admin-content">
      <div class="kpi-grid">
        <div class="kpi-card" style="background:var(--green-light);border:1px solid rgba(34,197,94,0.2);">
          <div class="kpi-label" style="color:var(--green-dark);">On Time</div>
          <div class="kpi-value" id="stat-on-time" style="color:var(--green-dark);">0</div>
        </div>
        <div class="kpi-card" style="background:var(--yellow-light);border:1px solid rgba(253,184,19,0.2);">
          <div class="kpi-label" style="color:#92610A;">Late</div>
          <div class="kpi-value" id="stat-late" style="color:#92610A;">0</div>
        </div>
        <div class="kpi-card" style="background:var(--red-light);border:1px solid rgba(239,68,68,0.2);">
          <div class="kpi-label" style="color:var(--red-dark);">Absent</div>
          <div class="kpi-value" id="stat-absent" style="color:var(--red-dark);">0</div>
        </div>
      </div>

      <div class="filter-chips" id="child-filters" style="margin:20px 0;display:flex;gap:10px;flex-wrap:wrap;">
        <div class="chip active" id="filter-chip-all-selector">All Children</div>
      </div>

      <div class="bento-grid">
        <div class="tile tile-12">
          <div class="table-header"><div class="table-title">Activity Feed</div></div>
          <div class="attendance-scroll" id="attendance-list">
            <div style="text-align:center;padding:40px;color:var(--text-muted);">
              <i class="bi bi-arrow-clockwise spin" style="display:block;font-size:2rem;margin-bottom:10px;"></i>
              Syncing logs...
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<nav class="bottom-nav mobile-only">
  <a href="map.html"><i class="bi bi-map-fill"></i>Track</a>
  <a href="attendance.html" class="active"><i class="bi bi-clock-history"></i>History</a>
  <a href="alerts.html"><i class="bi bi-bell-fill"></i>Alerts</a>
  <a href="profile.html"><i class="bi bi-person-fill"></i>Profile</a>
</nav>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="module">
  import { supabase, getUserProfile } from '../js/config.js';
  import { requireAuth, signOut } from '../js/auth.js';

  // ── 0. Auth gate ───────────────────────────────────────────────────────
  await requireAuth();
  const profile = await getUserProfile();

  if (!profile || !profile.organization_id) {
    setTimeout(() => signOut(), 2000);
    throw new Error('No organization_id on profile.');
  }

  const ORG_ID  = profile.organization_id;
  const USER_ID = profile.id;

  let records = [];

  function formatDate(dateStr) {
    try { return new Date(dateStr).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }); }
    catch { return dateStr; }
  }
  function formatTime(dateStr) {
    try { return new Date(dateStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
    catch { return dateStr; }
  }

  // ── 1. Sidebar ─────────────────────────────────────────────────────────
  const { data: org } = await supabase.from('organizations').select('name').eq('id', ORG_ID).single();
  if (org) {
    const el = document.getElementById('sidebar-school-name');
    if (el) el.innerHTML = `${org.name} <small>Parent Portal</small>`;
  }
  document.getElementById('sidebar-parent-name').textContent = profile.full_name || 'Guardian';
  document.getElementById('sidebar-initial').textContent     = (profile.full_name || 'G').charAt(0);

  // ── 2. Child filter chips — scoped to this org ─────────────────────────
  const { data: children } = await supabase
    .from('students')
    .select('full_name')
    .eq('parent_id', USER_ID)
    .eq('organization_id', ORG_ID);

  const container = document.getElementById('child-filters');
  const allChip   = document.getElementById('filter-chip-all-selector');
  if (allChip) allChip.onclick = (e) => filterChild('all', e.target);

  if (children) {
    children.forEach(c => {
      const firstName = c.full_name.split(' ')[0];
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.innerHTML = `<i class="bi bi-person-fill"></i> ${firstName}`;
      chip.onclick   = () => filterChild(firstName.toLowerCase(), chip);
      container.appendChild(chip);
    });
  }

  // ── 3. Notifications scoped to this org + this user ────────────────────
  const { data: logs } = await supabase
    .from('notifications')
    .select('*')
    .eq('organization_id', ORG_ID)
    .eq('user_id', USER_ID)
    .order('created_at', { ascending: false });

  if (logs && logs.length > 0) {
    const grouped = {};
    let onTime = 0, late = 0, absent = 0;

    logs.forEach(log => {
      const dateLabel = formatDate(log.created_at);
      if (!grouped[dateLabel]) grouped[dateLabel] = { date: dateLabel, events: [] };

      if (log.title.includes('Boarded')) onTime++;
      if (log.type === 'warning') late++;
      if (log.type === 'error')   absent++;

      const guessedChildName = log.title.split(' ')[0] || 'Student';
      grouped[dateLabel].events.push({
        type:     log.title.includes('Dropped') ? 'dropped' : 'boarded',
        child:    guessedChildName,
        event:    log.title,
        route:    log.message,
        time:     formatTime(log.created_at),
        verified: true
      });
    });

    document.getElementById('stat-on-time').textContent = onTime;
    document.getElementById('stat-late').textContent    = late;
    document.getElementById('stat-absent').textContent  = absent;

    records = Object.values(grouped);
    renderList('all');
  } else {
    document.getElementById('attendance-list').innerHTML =
      '<div style="text-align:center;padding:40px;color:var(--text-muted);">No attendance records found.</div>';
  }

  // ── 4. Render ──────────────────────────────────────────────────────────
  window.renderList = function(filter = 'all') {
    const list = document.getElementById('attendance-list');
    if (!list) return;
    list.innerHTML = '';

    records.forEach(group => {
      const events = filter === 'all' ? group.events : group.events.filter(e => e.child.toLowerCase() === filter);
      if (!events.length) return;

      const dateHeader = document.createElement('div');
      dateHeader.className = 'attendance-date-label';
      dateHeader.textContent = group.date;
      list.appendChild(dateHeader);

      events.forEach(ev => {
        const row = document.createElement('div');
        row.className = 'attendance-item';
        row.innerHTML = `
          <div class="attendance-icon ${ev.type}">${ev.type === 'dropped' ? '<i class="bi bi-house-door-fill"></i>' : '<i class="bi bi-bus-front-fill"></i>'}</div>
          <div class="attendance-info">
            <div class="event">${ev.event}</div>
            <div class="route">${ev.route}</div>
          </div>
          <div class="attendance-time">
            <div class="time">${ev.time}</div>
            <div class="verified">✓ VERIFIED</div>
          </div>`;
        list.appendChild(row);
      });
    });

    if (!list.children.length) {
      list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">No activity for selected child.</div>';
    }
  };

  function filterChild(child, el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    if (el) el.classList.add('active');
    renderList(child);
  }

  // ── 5. CSV Export ──────────────────────────────────────────────────────
  document.getElementById('export-btn').onclick = () => {
    if (!records.length) { alert('No data to export.'); return; }
    let csv = 'data:text/csv;charset=utf-8,Date,Student,Activity,Route,Timestamp\n';
    records.forEach(group => {
      group.events.forEach(e => {
        csv += `"${group.date}","${e.child}","${e.event}","${e.route.replace(/"/g,'""')}","${e.time}"\n`;
      });
    });
    const a = document.createElement('a');
    a.href     = encodeURI(csv);
    a.download = `SBTP_Attendance_${new Date().toISOString().split('T')[0]}.csv`;
    document.body.appendChild(a);
    a.click();
    a.remove();
  };
</script>
</body>
</html>
